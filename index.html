<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WeatherNow - Your Personal Weather Info</title>
	<link rel="stylesheet" href="style.css"/>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

	<div id="error" class="error hidden">
		<span id="error-message">⚠️ Network Error</span>
		<button id="retry" onclick="retrySearch()">🔄️ Retry</button>
		<button  onclick="dismissError()">✕</button>
	</div>

  	<!-- Header -->
	<header class="header">
	    <div class="header-inner">
	        <div class="logo">
	            <span class="logo-icon">◈</span>
	            <span class="logo-text">WeatherNow</span>
	        </div>
	        <div class="search-wrap">
	            <input type="text" id="city-input" class="search-input" placeholder="Search city…" autocomplete="off" />
	            <button id="search-btn" class="search-btn" onclick="triggerSearch()">Search</button>
	        </div>
	        <div class="unit-toggle">
	            <button id="btn-c" class="unit-btn active" onclick="setUnit('C')">°C</button>
	            <button id="btn-f" class="unit-btn" onclick="setUnit('F')">°F</button>
	        </div>
	    </div>
	    <div id="recent-wrap" class="recent-wrap hidden">
	        <span class="recent-label">Recent:</span>
	        <div id="recent-chips" class="chips"></div>
	    </div>
	</header>

	<main class="main">
	    <!-- Current Weather Card -->
	    <section class="current-card">
	        <div class="current-left">
	            <div class="city-name skeleton" id="city-name">—</div>
	            <div class="local-time skeleton" id="local-time">--:-- --</div>
	            <div class="weather-desc skeleton" id="weather-desc">—</div>
	        </div>
	        <div class="current-right">
	            <div class="weather-icon skeleton" id="weather-icon">—</div>
	            <div class="temperature skeleton" id="temperature">--°</div>
	            <div class="current-meta">
	                <div class="meta-item skeleton" id="humidity">💧 --%</div>
	                <div class="meta-item skeleton" id="windspeed">💨 -- km/h</div>
	            </div>
	        </div>
	    </section>
	    <!-- 7-Day Forecast -->
	    <section class="forecast-section">
	        <h2 class="section-title">7-Day Forecast</h2>
	        <div class="forecast-row" id="forecast-row"></div>
	    </section>
	</main>
	
	<script src="app.js"></script>

	
</body>
</html>
